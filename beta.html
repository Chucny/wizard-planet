function checkEventRedirect(year, month, day, startH, endH, targetFile, redirectIfActive) {
    var now = new Date();
    // month - 1 because JS Date months are 0-11 (Jan is 0)
    var isDate = (now.getFullYear() === year && now.getMonth() === (month - 1) && now.getDate() === day);
    
    var isTime = true;
    if (startH !== null && endH !== null) {
        var hr = now.getHours();
        isTime = (hr >= startH && hr < endH);
    }

    var active = isDate && isTime;

    // Logic: If (it is event AND we want to go there) OR (it is NOT event AND we want to leave)
    if (active === redirectIfActive) {
        window.location.href = targetFile;
    }
}

<script>
// ====================== CORE GAME ======================
const TILE_SIZE = 256;
let zoom = 15;
let map = document.getElementById('map');
let player = document.getElementById('player');
let mapTiles = [];
let fireballs = 30;
let wizardIdCounter = 1;
const wizards = {};
const spawnedBalls = new Set();
let inventory = [];

// ====================== MAP ======================
function latLngToTile(lat,lng,zoom) {
    const n = Math.pow(2, zoom);
    let x = Math.floor((lng + 180)/360 * n);
    let y = Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n);
    x = Math.max(0, Math.min(x,n-1));
    y = Math.max(0, Math.min(y,n-1));
    return {x,y};
}
function drawMap(lat,lng) {
    mapTiles.forEach(t=>t.remove()); mapTiles=[];
    const cols = Math.ceil(window.innerWidth / TILE_SIZE)+2;
    const rows = Math.ceil(window.innerHeight / TILE_SIZE)+2;
    const centerTile = latLngToTile(lat,lng,zoom);
    for (let dx=-Math.floor(cols/2); dx<=Math.floor(cols/2); dx++){
        for (let dy=-Math.floor(rows/2); dy<=Math.floor(rows/2); dy++){
            const tileX = centerTile.x+dx;
            const tileY = centerTile.y+dy;
            const img = document.createElement('img');
            img.src = `https://tile.openstreetmap.org/${zoom}/${tileX}/${tileY}.png`;
            img.className='tile';
            img.style.left=`${(dx+Math.floor(cols/2))*TILE_SIZE}px`;
            img.style.top=`${(dy+Math.floor(rows/2))*TILE_SIZE}px`;
            map.appendChild(img);
            mapTiles.push(img);
        }
    }
    player.style.left = window.innerWidth/2+"px";
    player.style.top = window.innerHeight/2+"px";
}
async function updateMapWithCurrentLocation() {
    if (navigator.geolocation) {
        // We define the options here
        const options = {
            enableHighAccuracy: true, // Forces the GPS hardware on
            timeout: 10000,           // Increased to 10 seconds
            maximumAge: 0             // Forces a fresh location, not a cached one
        };

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                // SUCCESS: We got a real GPS lock
                console.log("GPS Lock Acquired");
                drawMap(pos.coords.latitude, pos.coords.longitude);
            }, 
            async (error) => {
                // FAIL: Only use IP location if GPS fails or times out
                console.log("GPS failed or timed out. Falling back to IP...");
                try {
                    const res = await fetch("https://api.codetabs.com/v1/geolocation/json");
                    const data = await res.json();
                    drawMap(data.latitude, data.longitude);
                } catch (e) {
                    console.error("Total location failure:", e);
                }
            }, 
            options
        );
    }
}
updateMapWithCurrentLocation();
setInterval(updateMapWithCurrentLocation,15000);

// ====================== WIZARDS & INVENTORY ======================
function getRandomColor(){ return ['red','green','blue','purple','yellow','gold'][Math.floor(Math.random()*6)]; }
function spawnWizardBall(x,y,wizardData=null){
    if(!wizardData){
        wizardData = {id: wizardIdCounter++, iv:`${Math.floor(Math.random()*11)}/${Math.floor(Math.random()*11)}/${Math.floor(Math.random()*11)}`, color:getRandomColor(), name:'Wizard '+wizardIdCounter, shape:'circle'};
    }
    wizards[wizardData.id] = wizardData;
    const ball=document.createElement('div');
    ball.className='red-ball';
    ball.style.left=x+'px'; ball.style.top=y+'px';
    ball.style.background=wizardData.color;
    ball.innerHTML = `<div class="eye left"></div><div class="eye right"></div><div class="hat"></div>`;
    ball.addEventListener('click',()=>{catchWizard(ball,wizardData)});
    map.appendChild(ball);
    spawnedBalls.add(ball);
}
function despawnWizardBall(ball,wizardData){
    if(spawnedBalls.has(ball)){ ball.remove(); spawnedBalls.delete(ball); delete wizards[wizardData.id]; }
}
function addToInventory(wizardData){ inventory.push(wizardData); }

// Inventory UI
const inventoryPanel=document.getElementById("inventoryPanel");
const inventoryButton=document.getElementById("inventoryButton");
function createWizardCard(wizardData){
    const card=document.createElement("div"); card.className="wizard-card";
    const nameDiv=document.createElement("div"); nameDiv.className="wizard-name"; nameDiv.textContent=wizardData.name;
    const colorDiv=document.createElement("div"); colorDiv.className="wizard-color"; 
    colorDiv.style.background=wizardData.color;
    if(wizardData.shape==="octagon"){
        colorDiv.style.clipPath="polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)";
        colorDiv.style.borderRadius="0";
    }
    const ivParts=wizardData.iv.split("/").map(n=>parseInt(n));
    const totalIV=ivParts.reduce((a,b)=>a+b,0);
    const starDiv=document.createElement("div"); starDiv.className="wizard-stars"; starDiv.textContent="⭐".repeat(Math.ceil((totalIV/30)*3));
    const statsDiv=document.createElement("div"); statsDiv.className="wizard-stats";
    ["Atk","Def","Spd"].forEach((s,i)=>{ 
        const statDiv=document.createElement("div"); statDiv.textContent=s+": ";
        const bar=document.createElement("div"); bar.className="stat-bar"; bar.style.width=(ivParts[i]/10*100)+"%";
        statDiv.appendChild(bar); statsDiv.appendChild(statDiv);
    });
    card.append(nameDiv,colorDiv,starDiv,statsDiv);
    return card;
}

function openInventory() {
    inventoryPanel.innerHTML = "";
    
    // 1. Create Search Container
    const searchContainer = document.createElement("div");
    searchContainer.style.cssText = "width:100%; padding:10px; position:sticky; top:0; background:rgba(175,228,222,1); z-index:10; display:flex; gap:10px;";
    
    const searchInput = document.createElement("input");
    searchInput.placeholder = "Search wizards by name...";
    searchInput.style.cssText = "flex:1; padding:8px; border-radius:5px; border:1px solid #444;";
    
    searchContainer.appendChild(searchInput);
    inventoryPanel.appendChild(searchContainer);

    // 2. Create a wrapper for the cards
    const cardWrapper = document.createElement("div");
    cardWrapper.style.cssText = "display:flex; flex-wrap:nowrap; gap:10px; padding-bottom:10px;";
    inventoryPanel.appendChild(cardWrapper);

    // 3. Function to render filtered list
    const renderWizards = (filter = "") => {
    cardWrapper.innerHTML = "";
    const filtered = inventory.filter(w => 
        w && w.name && w.name.toLowerCase().includes(filter.toLowerCase())
    );
    filtered.forEach(w => {
        const card = createWizardCard(w);
        // ONLY append if createWizardCard actually returned an element
        if (card) {
            cardWrapper.appendChild(card);
        }
    });
};
    // 4. Initial render and search event
    renderWizards();
    searchInput.addEventListener("input", (e) => renderWizards(e.target.value));

    inventoryPanel.style.display = "flex";
}

function closeInventory(){ inventoryPanel.style.display="none"; }
inventoryButton.addEventListener("click",()=>{ inventoryPanel.style.display==="none" ? openInventory() : closeInventory(); });

// Save / Load
function downloadInventory(){
    const jsonString = JSON.stringify(inventory,null,2);
    const blob = new Blob([jsonString], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = prompt("Name your save file")+".wizard";
    link.click();
}
function loadInventoryFromFile(){
    const fileInput = document.getElementById('loadFileInput');
    fileInput.click();
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(Array.isArray(data)){ inventory = data; alert('Loaded '+inventory.length+' wizards!'); if(inventoryPanel.style.display!=="none") openInventory(); }
            } catch(err){ alert('Error: '+err.message); }
        };
        reader.readAsText(file);
    };
}

// Spawn initial + periodic

setInterval(()=>{ fireballs++; },8000);

// ====================== CATCH SCREEN ======================

const catchWizardElem = document.getElementById("catchWizardBall");
const throwBall = document.getElementById("throwBall");
let currentCatchWizard = null;

function openCatchScreen(wizardData) {
    currentCatchWizard = wizardData;
    catchScreen.style.display = "block";
    catchWizardElem.style.background = wizardData.color;
    catchWizardElem.style.clipPath = wizardData.shape==="octagon" ? "polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)" : "none";
    catchWizardElem.style.borderRadius = wizardData.shape==="octagon" ? "0" : "50%";
    throwBall.style.transition = "none";
    throwBall.style.bottom = "80px";
}
function closeCatchScreen(){ catchScreen.style.display="none"; }

throwBall.addEventListener("click", () => {
    throwBall.style.transition = "all 0.6s ease";
    throwBall.style.bottom = "55%";
    setTimeout(() => {
        const caught = Math.random() < 0.75;
        if(caught){
            const name = prompt("Name your wizard:", currentCatchWizard.name) || currentCatchWizard.name;
            currentCatchWizard.name = name.trim();
            inventory.push(currentCatchWizard);
            alert("CAUGHT!\n"+currentCatchWizard.name+"\nIV: "+currentCatchWizard.iv);
            if(inventoryPanel.style.display!=="none") openInventory();
            closeCatchScreen();
        } else {
            alert("Escaped!");

        }

});

function catchWizard(ball, wizardData){
    if(fireballs>0){
        fireballs--;
        openCatchScreen(wizardData);
        despawnWizardBall(ball,wizardData);
    } else alert("No fireballs left!");
}

// ====================== GLOBAL RAID SYSTEM (PUBLIC MQTT - NO API KEY) ======================
const MQTT_BROKER = "wss://broker.hivemq.com:8884/mqtt";
let mqttClient = null;
let raidActive = null;
let raidHost = false;
let currentRaidCode = null;
const MAX_PLAYERS = 20;
const RAID_TIME = 300;
const RAID_TOPIC_PREFIX = "wizard-raid/";

function generateRaidCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
function randomRaidColor(){ return ["red","blue","green","purple","orange","pink","cyan"][Math.floor(Math.random()*7)]; }
function createRaidBoss(hp=2000){
    const shiny = Math.random()<0.1;
    return { name:"Polygon-"+ "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)], color:shiny?"gold":randomRaidColor(), shiny, maxHp:hp, hp:hp, shape:"octagon" };
}

// Connect to public MQTT broker (works worldwide, no key, no signup)
function connectMQTT(code){
    if(mqttClient) mqttClient.end();
    mqttClient = mqtt.connect(MQTT_BROKER, { keepalive: 30 });
    
    mqttClient.on('connect', () => {
        console.log("✅ Connected");
        mqttClient.subscribe(RAID_TOPIC_PREFIX + code);
        
        
        if(raidHost){
    mqttClient.publish(RAID_TOPIC_PREFIX + code, JSON.stringify({type:"raidState", raid:raidActive}));
} else {
    // Joiner now uses window.playerName instead of prompt
    mqttClient.publish(RAID_TOPIC_PREFIX + code, JSON.stringify({
        type:"joinRaid",
        playerName: window.playerName || "Guest", 
        wizards: Array.from({length:6},(_,i)=>({name:`Wizard-${i+1}`, damagePerSec:5}))
    }));
}
    });

    mqttClient.on('message', (topic, payload) => {
        try {
            const msg = JSON.parse(payload.toString());
            if(msg.type === "joinRaid" && raidHost && raidActive){
                if(raidActive.players.length >= MAX_PLAYERS) return;
                raidActive.players.push({name:msg.playerName, wizards:msg.wizards});
                mqttClient.publish(RAID_TOPIC_PREFIX + code, JSON.stringify({type:"raidState", raid:raidActive}));
                alert(msg.playerName + " joined the raid!");
            }
            if(msg.type === "raidState"){
                raidActive = msg.raid;
                showRaidBattleScreen(raidActive.boss);
                updateRaidUI();
            }
            if(msg.type === "raidEnded"){
                raidScreen.style.display = "none";
                if(msg.boss && msg.boss.hp <= 0) collectPolygonFromRaid(msg.boss);
                raidActive = null;
                if(mqttClient) mqttClient.end();
            }
        } catch(e){}
    });
}

// Create / Join
function createRaid(){
    raidHost = true;
    currentRaidCode = generateRaidCode();
    raidActive = {
        code: currentRaidCode,
        boss: createRaidBoss(),
        // Changed prompt to window.playerName
        players: [{
            name: window.playerName || "Host", 
            wizards: Array.from({length:6},(_,i)=>({name:`Wizard-${i+1}`, damagePerSec:5}))
        }],
        timer: RAID_TIME
    };
    connectMQTT(currentRaidCode);
    alert(`🌍 RAID CREATED!\nCode: ${currentRaidCode}\nBoss: ${raidActive.boss.name}`);
    showRaidBattleScreen(raidActive.boss);
    startRaidBattleLoop();
}

function joinRaid(){
    raidHost = false;
    const code = prompt("Enter raid code:").toUpperCase().trim();
    if(!code) return;
    currentRaidCode = code;
    connectMQTT(code);
    showRaidBattleScreen({name:"Waiting for host...", color:"gray"}); // placeholder until state arrives
}

// Battle loop (only host runs the logic)
function startRaidBattleLoop(){
    if(!raidHost || !raidActive) return;
    showRaidBattleScreen(raidActive.boss);
    raidActive.intervalId = setInterval(() => {
        if(!raidActive) return;
        
        let totalDPS = 0;
        raidActive.players.forEach(p => p.wizards.forEach(w => totalDPS += w.damagePerSec));
        raidActive.boss.hp = Math.max(0, raidActive.boss.hp - totalDPS);
        raidActive.timer--;

        updateRaidUI();

        // Broadcast full state to everyone
        if(mqttClient) mqttClient.publish(RAID_TOPIC_PREFIX + currentRaidCode, JSON.stringify({type:"raidState", raid:raidActive}));

        if(raidActive.boss.hp <= 0){
            clearInterval(raidActive.intervalId);
            if(mqttClient) mqttClient.publish(RAID_TOPIC_PREFIX + currentRaidCode, JSON.stringify({type:"raidEnded", boss:raidActive.boss}));
            collectPolygonFromRaid(raidActive.boss);
            raidScreen.style.display = "none";
            raidActive = null;
        } else if(raidActive.timer <= 0){
            clearInterval(raidActive.intervalId);
            if(mqttClient) mqttClient.publish(RAID_TOPIC_PREFIX + currentRaidCode, JSON.stringify({type:"raidEnded"}));
            alert("⏱️ Time's up! Raid failed.");
            raidScreen.style.display = "none";
            raidActive = null;
        }
    }, 1000);
}

(function() {
    // Scene State
    let angle = 0;
    let isDragging = false;
    let startX = 0;
    const map = document.getElementById('map');

    // --- 1. The Render Function ---
    function update3D() {
        // Tilt the ground and spin it
        // translateY shifts the "center" so the bottom of the map isn't cut off
        map.style.transform = `rotateX(60deg) translateY(150px) rotateZ(${angle}deg)`;

        // Force Player and Wizards to stay FLAT (Parallel to ground)
        const entities = document.querySelectorAll('#player, .red-ball');
        entities.forEach(el => {
            el.style.transform = `translate(-50%, -50%)`; 
            // We do NOT use rotateX here so they don't stand up
        });
    }

    // --- 2. Fixed Scrolling Logic (Natural Grab & Pull) ---
    const handleStart = (x) => {
        isDragging = true;
        startX = x;
    };

    const handleMove = (x) => {
        if (!isDragging) return;
        let dx = x - startX;
        angle -= dx * 0.4; // Pull right = map turns left
        startX = x;
        update3D();
    };

    const handleEnd = () => { isDragging = false; };

    // Global Listeners to prevent "stuck" scrolling
    window.addEventListener('mousedown', (e) => handleStart(e.clientX));
    window.addEventListener('mousemove', (e) => handleMove(e.clientX));
    window.addEventListener('mouseup', handleEnd);

    window.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX));
    window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX));
    window.addEventListener('touchend', handleEnd);

    // --- 3. Fix the "Buried/Corner" Spawn Issue ---
    // Highjack spawn function to ensure wizards are children of the map
    const originalSpawn = window.spawnWizardBall;

        const balls = document.getElementsByClassName('red-ball');
        const latest = balls[balls.length - 1];
        if (latest && latest.parentElement !== map) {
            map.appendChild(latest);
        }
        update3D();
    };

    // Initial Run
    update3D();
    console.log("3D Perspective Initialized: Flat Wizards & Fog active.");
})();

<script>
(function() {
    let tTopic = null, pReady = false, mReady = false, mySelection = null, theirSelection = null;

   

    // --- INTERNET (MQTT) HANDSHAKE ---
    function getTradeClient(cb) {
        if (window.mqttClient && window.mqttClient.connected) return cb(window.mqttClient);
        window.mqttClient = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", { keepalive: 30 });
        window.mqttClient.on('connect', () => cb(window.mqttClient));
    }

    document.getElementById('tradeBtn').onclick = () => {
        document.getElementById('tradeHUD').style.display = 'flex';
        pReady = false; mReady = false;
        document.getElementById('tradeMenu').style.display = 'block';
        document.getElementById('tradeSelection').style.display = 'none';
        document.getElementById('tradeConfirmArea').style.display = 'none';
    };

    document.getElementById('btnHost').onclick = () => {
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        document.getElementById('tradeStatus').innerText = "ROOM: " + code;
        getTradeClient(c => initTrade(code, c));
    };

    document.getElementById('btnJoin').onclick = () => {
        const code = document.getElementById('tradeCodeInput').value.toUpperCase();
        if(code.length === 6) getTradeClient(c => initTrade(code, c));
    };

    function initTrade(code, client) {
        tTopic = "wizard_planet/trade_v300/" + code;
        client.subscribe(tTopic);
        client.removeAllListeners('message');
        
        client.on('message', (topic, msg) => {
            if (topic !== tTopic) return;
            const data = JSON.parse(msg.toString());
            if (data.sender === window.playerName) return;

            if (data.type === "offer") {
                theirSelection = data.wiz;
                document.getElementById('theirOffer').innerText = data.wiz.name;
                const b = document.getElementById('confirmTradeBtn');
                b.disabled = false; b.style.background = "#3498db";
            } else if (data.type === "confirm") {
                pReady = true;
                if (mReady) finalize();
            }
        });

        document.getElementById('tradeMenu').style.display = 'none';
        document.getElementById('tradeSelection').style.display = 'block';
        
        const list = document.getElementById('tradeWizardList');
        list.innerHTML = "";
        (window.inventory || []).forEach((wiz, idx) => {
            if(wiz.id === "XP_TRACKER") return;
            const div = document.createElement('div');
            div.style = "min-width:100px; padding:10px; background:white; border:2px solid #3498db; border-radius:10px; cursor:pointer; color:black;";
            div.innerHTML = `<b>${wiz.name}</b>`;
            div.onclick = () => {
                mySelection = { ...wiz, idx: idx };
                document.getElementById('myOffer').innerText = wiz.name;
                document.getElementById('tradeSelection').style.display = 'none';
                document.getElementById('tradeConfirmArea').style.display = 'block';
                client.publish(tTopic, JSON.stringify({ type:"offer", sender:window.playerName, wiz:wiz }));
            };
            list.appendChild(div);
        });
    }

    document.getElementById('confirmTradeBtn').onclick = function() {
        mReady = true;
        this.style.background = "#2ecc71";
        this.innerText = "READY!";
        window.mqttClient.publish(tTopic, JSON.stringify({ type:"confirm", sender:window.playerName }));
        if (pReady) finalize();
    };

    function finalize() {
        window.inventory.splice(mySelection.idx, 1);
        window.inventory.push(theirSelection);
        if (typeof saveInventoryToFirebase === "function") saveInventoryToFirebase();
        alert("TRADE SUCCESS!");
        document.getElementById('tradeHUD').style.display = 'none';
        if (typeof openInventory === "function") openInventory(); 
    }
})();
</script>

            <button id="battleBtn" style="background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; border: 3px solid white; border-radius: 50px; padding: 12px 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.1s, filter 0.2s; cursor: pointer; font-family: sans-serif;">⚔️</button>
        `;
    }

    // Inject the Arena Room Selection Layout incorporating Pass Meters directly inside the tray
    const modalHTML = `
        <div id="customRaidMenuModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; justify-content: center; align-items: center; background-color: rgba(0,0,0,0.65); font-family: sans-serif;">
            <div id="customRaidMenuContent" style="position: relative; width: 95%; max-width: 440px; height: 460px; border-radius: 25px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 25px 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); box-sizing: border-box; border: 4px solid rgba(255,255,255,0.2);
                background-image: url('YOUR_POLYGON_IMAGE_URL'), url('https://wallup.net/wp-content/uploads/2016/05/02/274452-architecture-nature-trees-Sun-pillar-stone-Colosseum-Rome-Italy-capital-stairs-sunlight-path-field-grass-arena-arch-building-monuments.jpg');
                background-size: 150px auto, cover; background-position: center 30%, center; background-repeat: no-repeat, no-repeat;">
                
                <button id="closeRaidMenuBtn" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; border-radius: 50%; width: 35px; height: 35px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.2s;">✕</button>
                
                <div style="text-align: center; width: 100%;">
                    <h2 id="customRaidTitle" style="margin: 0; color: white; font-size: 26px; font-weight: 900; text-shadow: 0 3px 10px rgba(0,0,0,0.9); letter-spacing: 1px; text-transform: uppercase;">RAID HUB</h2>
                    <p id="customRaidStatus" style="color: #e0e0e0; font-size: 12px; text-shadow: 0 2px 5px rgba(0,0,0,0.9); margin: 6px 0 0 0; font-weight: bold; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 10px; display: inline-block;">Ready to scan your location</p>
                </div>

                <div style="background: rgba(255, 255, 255, 0.9); padding: 10px 15px; border-radius: 15px; width: 85%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; border: 2px solid #ff4757; box-sizing: border-box;">
                    <div style="font-size: 11px; font-weight: bold; color: #7f8c8d; margin-bottom: 2px;">Steps: <span id="hudSessionSteps">0</span></div>
                    <div style="font-size: 13px; font-weight: bold; color: #2c3e50; margin-bottom: 4px;">🎟️ Raid Tickets: <span id="hudPassCount">0</span></div>
                    <div style="width: 100%; background: #e0e0e0; height: 10px; border-radius: 5px; overflow: hidden; position: relative;">
                        <div id="hudProgressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); transition: width 0.2s;"></div>
                    </div>
                    <div style="font-size: 11px; margin-top: 4px; color: #7f8c8d;"><span id="hudProgressSteps">0</span> / 100 steps</div>
                </div>
                
                <button id="customJoinRaidBtn" style="background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: 3px solid white; border-radius: 50px; padding: 14px 40px; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); cursor: pointer; transition: transform 0.1s, filter 0.2s;">JOIN RAID</button>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    // Bind original control click listeners
    const customModal = document.getElementById("customRaidMenuModal");
    const statusText = document.getElementById("customRaidStatus");
    const titleText = document.getElementById("customRaidTitle");
    const greenActionBtn = document.getElementById("customJoinRaidBtn");

    document.getElementById("battleBtn").onclick = function() {
        customModal.style.display = "flex";
        statusText.textContent = "Ready to scan your location";
        titleText.textContent = "RAID HUB";
        updateSensorPassUI(); // Ensure accurate numbers refresh on load
    };

    document.getElementById("closeRaidMenuBtn").onclick = function() {
        customModal.style.display = "none";
        clearTimeout(checkTimeout);
    };

    greenActionBtn.onclick = async function() {
        greenActionBtn.disabled = true;
        statusText.textContent = "Locating your IP city...";
        
        let cityName = await locateUserCity();
        currentRaidCode = cityName.toUpperCase();
        titleText.textContent = "RAID: " + currentRaidCode;
        statusText.textContent = "Searching for active raids in " + cityName + "...";

        raidHost = false;
        raidFound = false;

        // Initialize connection & verify pass wallet entry
        connectMQTT(currentRaidCode);

        // If no host broadcasts within 1.5 seconds, we initialize the room as the host
        checkTimeout = setTimeout(() => {
            if (!raidFound && raidPasses >= 0) {
                console.log("No active room found. Creating automated city raid room...");
                statusText.textContent = "Creating new city room...";
                
                raidHost = true;
                raidActive = {
                    code: currentRaidCode,
                    boss: createRaidBoss(),
                    players: [{
                        name: window.playerName || "Host", 
                        wizards: Array.from({length: 6}, (_, i) => ({ name: `Wizard-${i + 1}`, damagePerSec: 5 }))
                    }],
                    timer: RAID_TIME
                };

                // Broadcast room generation
                mqttClient.publish(RAID_TOPIC_PREFIX + currentRaidCode, JSON.stringify({ type: "raidState", raid: raidActive }));
                
                customModal.style.display = "none";
                showRaidBattleScreen(raidActive.boss);
                startRaidBattleLoop();
            }
            greenActionBtn.disabled = false;
        }, 1500);
    };
});

// 7. Gyrometer & Accelerometer Movement/Step Detection Engine
let lastAccelMagnitude = 0;
window.addEventListener("devicemotion", (event) => {
    let acc = event.accelerationIncludingGravity || event.acceleration;
    if (!acc || acc.x === null) return;

    // Calculate total structural force vector magnitude 
    let magnitude = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
    let deltaForce = Math.abs(magnitude - lastAccelMagnitude);
    lastAccelMagnitude = magnitude;

    // A delta threshold over ~11.5 indicates a clear physical stride action occurred
    if (deltaForce > 11.5) {
        let currentTime = Date.now();
        
        // Exact 0.5-second (500ms) cooldown tracking restriction rule
        if (currentTime - lastSensorStepTime >= 500) {
            totalSessionSteps++;
            currentMeterSteps++;
            lastSensorStepTime = currentTime;

            // When progress hits 100 steps, clear meter progress down to 0 and credit a pass
            if (currentMeterSteps >= 100) {
                currentMeterSteps = 0;
                raidPasses++;
            }
            updateSensorPassUI();
        }
    }
});
</script>

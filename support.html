<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard Planet - Support</title>
    <style>
        body {
            background-color: white; /* Changed to white */
            color: black; /* Changed text to black for readability on white bg */
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            padding: 40px 20px;
        }

        h2 {
            font-size: 2.5em;
            color: #4834d4; /* Darker purple to contrast with white bg */
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
        }

        .subtitle {
            color: #16213e;
            margin-top: 10px;
            font-style: italic;
        }

        /* The container that holds the form */
        .form-wrapper {
            background: black; /* Completely black background */
            border: 4px solid black;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 50px;
            width: 95%;
            max-width: 700px;
            overflow: hidden;
        }

        iframe {
            border-radius: 10px;
            width: 100%;
            border: none;
            /* Note: Google Form internal styling must be changed in Google Forms settings */
        }

        .footer-text {
            font-size: 0.8em;
            color: #636e72;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>Wizard Planet - Support</h2>
        <p class="subtitle">Need help? Contact us here with any issues regarding Wizard Planet.</p>
    </div>

    <div class="form-wrapper">
        <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLSeSaaF3p6okgOMAk-b0MBpNDokPcLgQ616hZTuVDeywFQyK0g/viewform?embedded=true" 
            width="640" 
            height="850" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0">
            Loading…
        </iframe>
    </div>

    <p class="footer-text">Wizard Planet © 2026</p>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Planet</title>
<style>
/* --- General --- */
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; font-family:sans-serif; background-color:lightblue; }
/* --- Map --- */
#map { position:relative; width:100%; height:100%; overflow:hidden; }
/* --- Player --- */
#player { position:absolute; width:20px; height:20px; background:red; border-radius:50%; transform:translate(-50%,-50%); z-index:10; }
/* --- Wizard Balls --- */
.red-ball { position:absolute; width:50px; height:50px; border-radius:50%; cursor:pointer; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:15; }
.red-ball .eye { position:absolute; width:8px; height:8px; background:white; border-radius:50%; top:15px; }
.red-ball .eye.left { left:12px; }
.red-ball .eye.right { right:12px; }
.red-ball .hat { position:absolute; width:20px; height:20px; background:white; border-radius:50%; top:-10px; left:50%; transform:translateX(-50%); border:2px solid black; }
/* --- Fireball --- */
.fireball { position:absolute; width:20px; height:20px; background:orange; border-radius:50%; z-index:20; pointer-events:none; }
/* --- Map tiles --- */
.tile { position:absolute; width:256px; height:256px; z-index:0; }
/* --- Inventory Panel --- */
#inventoryPanel { position:fixed; bottom:0; left:0; width:100%; max-height:50%; background:rgba(175,228,222,0.95); color:black; overflow-x:auto; overflow-y:hidden; padding:10px; display:flex; flex-wrap:nowrap; align-items:flex-start; gap:10px; z-index:100; box-shadow:0 -5px 15px rgba(0,0,0,0.5); display:none; }
/* --- Wizard card --- */
.wizard-card { border:1px solid #444; padding:5px; background:lightblue; width:120px; text-align:center; border-radius:8px; flex:0 0 auto; }
.wizard-name { font-weight:bold; margin-bottom:5px; }
.wizard-color { width:30px; height:30px; border-radius:50%; margin:5px auto; }
.wizard-stars { margin:5px 0; }
.wizard-stats div { font-size:12px; margin:2px 0; }
.stat-bar { display:inline-block; height:6px; background:limegreen; margin-left:5px; border-radius:3px; }
/* --- Inventory Button --- */
#inventoryButton { position:fixed; bottom:10px; right:10px; z-index:150; width:50px; height:50px; border:none; background:#ff8800; color:white; font-weight:bold; border-radius:50%; cursor:pointer; font-size:20px; }
/* --- Save Button --- */
#savebutton { position:fixed; bottom:10px; left:10px; z-index:150; }
/* --- Raid UI --- */
#raidUI { position:fixed; top:10px; right:10px; z-index:300; display:flex; flex-direction:column; gap:5px; }
#raidUI button { padding:5px 10px; font-weight:bold; border-radius:5px; cursor:pointer; }
/* --- RAID BATTLE SCREEN --- */
#raidBattleScreen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-image:ur[](https://wallup.net/wp-content/uploads/2016/05/02/274452-architecture-nature-trees-Sun-pillar-stone-Colosseum-Rome-Italy-capital-stairs-sunlight-path-field-grass-arena-arch-building-monuments.jpg); z-index:500; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:50px; }
#raidTimer { width:60px; height:60px; border-radius:50%; background:orange; color:white; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold; margin-bottom:20px; }
#raidBossName { color:white; font-size:24px; font-weight:bold; margin-bottom:10px; }
#raidBossHPContainer { width:80%; height:20px; background:#333; border-radius:10px; margin-bottom:20px; }
#raidBossHP { height:100%; width:100%; background:red; border-radius:10px; }
#raidBossCircle { width:120px; height:120px; border-radius:50%; margin-bottom:40px; }
#raidPlayerWizard { width:60px; height:60px; border-radius:50%; background:yellow; position:relative; }
</style>
</head>
<body>
<!-- Map and player -->
<div id="map">
    <div id="player"></div>
</div>

<!-- Inventory panel -->
<div id="inventoryPanel"></div>
<button id="inventoryButton">O</button>



<!-- Raid UI -->
<div id="raidUI">
    <button onclick="createRaid()">Create Raid</button>
    <button onclick="joinRaid()">Join Raid</button>
</div>

<!-- RAID BATTLE SCREEN -->
<div id="raidBattleScreen">
    <div id="raidTimer">300</div>
    <div id="raidBossName">Boss</div>
    <div id="raidBossHPContainer"><div id="raidBossHP"></div></div>
    <div id="raidBossCircle"></div>
    <div id="raidPlayerWizard">

        <div class="eye" style="position:absolute; width:8px; height:8px; background:white; border-radius:50%; top:15px; right:10px;"></div>

    </div>
</div>

<!-- CATCH SCREEN -->
<div id="catchScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-image:ur[](https://images2.alphacoders.com/117/11762.jpg); z-index:700; overflow:hidden;">
    <div id="catchWizardBall" style="position:absolute; top:30%; left:50%; width:100px; height:100px; border-radius:50%; transform:translateX(-50%);"></div>
    <div id="throwBall" style="position:absolute; bottom:80px; left:50%; width:60px; height:60px; background:orange; border-radius:50%; transform:translateX(-50%); cursor:pointer;"></div>
    <button onclick="closeCatchScreen()" style="position:absolute; top:20px; right:20px; z-index:710;">X</button>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
// ====================== CORE GAME ======================
const TILE_SIZE = 256;
let zoom = 15;
let map = document.getElementById('map');
let player = document.getElementById('player');
let mapTiles = [];
let fireballs = 30;
let wizardIdCounter = 1;
const wizards = {};
const spawnedBalls = new Set();
let inventory = [];

// ====================== MAP ======================
function latLngToTile(lat,lng,zoom) {
    const n = Math.pow(2, zoom);
    let x = Math.floor((lng + 180)/360 * n);
    let y = Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n);
    x = Math.max(0, Math.min(x,n-1));
    y = Math.max(0, Math.min(y,n-1));
    return {x,y};
}
function drawMap(lat,lng) {
    mapTiles.forEach(t=>t.remove()); mapTiles=[];
    const cols = Math.ceil(window.innerWidth / TILE_SIZE)+2;
    const rows = Math.ceil(window.innerHeight / TILE_SIZE)+2;
    const centerTile = latLngToTile(lat,lng,zoom);
    for (let dx=-Math.floor(cols/2); dx<=Math.floor(cols/2); dx++){
        for (let dy=-Math.floor(rows/2); dy<=Math.floor(rows/2); dy++){
            const tileX = centerTile.x+dx;
            const tileY = centerTile.y+dy;
            const img = document.createElement('img');
            img.src = `https://tile.openstreetmap.org/${zoom}/${tileX}/${tileY}.png`;
            img.className='tile';
            img.style.left=`${(dx+Math.floor(cols/2))*TILE_SIZE}px`;
            img.style.top=`${(dy+Math.floor(rows/2))*TILE_SIZE}px`;
            map.appendChild(img);
            mapTiles.push(img);
        }
    }
    player.style.left = window.innerWidth/2+"px";
    player.style.top = window.innerHeight/2+"px";
}
async function updateMapWithCurrentLocation() {
    if (navigator.geolocation){
        navigator.geolocation.getCurrentPosition(pos=>{
            drawMap(pos.coords.latitude, pos.coords.longitude);
        }, async () => {
            try{
                const res=await fetch("https://api.codetabs.com/v1/geolocation/json");
                const data=await res.json();
                drawMap(data.latitude,data.longitude);
            }catch(e){}
        }, {enableHighAccuracy:true,timeout:5000});
    }
}
updateMapWithCurrentLocation();
setInterval(updateMapWithCurrentLocation,30000);

// ====================== WIZARDS & INVENTORY ======================
function getRandomColor(){ return ['red','green','blue','purple','yellow','gold'][Math.floor(Math.random()*6)]; }
function spawnWizardBall(x,y,wizardData=null){
    if(!wizardData){
        wizardData = {id: wizardIdCounter++, iv:`${Math.floor(Math.random()*10)}/${Math.floor(Math.random()*10)}/${Math.floor(Math.random()*10)}`, color:getRandomColor(), name:'Wizard '+wizardIdCounter, shape:'circle'};
    }
    wizards[wizardData.id] = wizardData;
    const ball=document.createElement('div');
    ball.className='red-ball';
    ball.style.left=x+'px'; ball.style.top=y+'px';
    ball.style.background=wizardData.color;
    ball.innerHTML = `<div class="eye left"></div><div class="eye right"></div><div class="hat"></div>`;
    ball.addEventListener('click',()=>{catchWizard(ball,wizardData)});
    map.appendChild(ball);
    spawnedBalls.add(ball);
}
function despawnWizardBall(ball,wizardData){
    if(spawnedBalls.has(ball)){ ball.remove(); spawnedBalls.delete(ball); delete wizards[wizardData.id]; }
}
function addToInventory(wizardData){ inventory.push(wizardData); }

// Inventory UI
const inventoryPanel=document.getElementById("inventoryPanel");
const inventoryButton=document.getElementById("inventoryButton");
function createWizardCard(wizardData){
    const card=document.createElement("div"); card.className="wizard-card";
    const nameDiv=document.createElement("div"); nameDiv.className="wizard-name"; nameDiv.textContent=wizardData.name;
    const colorDiv=document.createElement("div"); colorDiv.className="wizard-color"; 
    colorDiv.style.background=wizardData.color;
    if(wizardData.shape==="octagon"){
        colorDiv.style.clipPath="polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)";
        colorDiv.style.borderRadius="0";
    }
    const ivParts=wizardData.iv.split("/").map(n=>parseInt(n));
    const totalIV=ivParts.reduce((a,b)=>a+b,0);
    const starDiv=document.createElement("div"); starDiv.className="wizard-stars"; starDiv.textContent="⭐".repeat(Math.ceil((totalIV/30)*3));
    const statsDiv=document.createElement("div"); statsDiv.className="wizard-stats";
    ["Atk","Def","Spd"].forEach((s,i)=>{ 
        const statDiv=document.createElement("div"); statDiv.textContent=s+": ";
        const bar=document.createElement("div"); bar.className="stat-bar"; bar.style.width=(ivParts[i]/10*100)+"%";
        statDiv.appendChild(bar); statsDiv.appendChild(statDiv);
    });
    card.append(nameDiv,colorDiv,starDiv,statsDiv);
    return card;
}
function openInventory(){ inventoryPanel.innerHTML=""; inventory.forEach(w=>inventoryPanel.appendChild(createWizardCard(w))); inventoryPanel.style.display="flex"; }
function closeInventory(){ inventoryPanel.style.display="none"; }
inventoryButton.addEventListener("click",()=>{ inventoryPanel.style.display==="none" ? openInventory() : closeInventory(); });

// Save / Load
function downloadInventory(){
    const jsonString = JSON.stringify(inventory,null,2);
    const blob = new Blob([jsonString], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = prompt("Name your save file")+".wizard";
    link.click();
}
function loadInventoryFromFile(){
    const fileInput = document.getElementById('loadFileInput');
    fileInput.click();
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if(Array.isArray(data)){ inventory = data; alert('Loaded '+inventory.length+' wizards!'); if(inventoryPanel.style.display!=="none") openInventory(); }
            } catch(err){ alert('Error: '+err.message); }
        };
        reader.readAsText(file);
    };
}

// Spawn initial + periodic
spawnWizardBall(200,200); spawnWizardBall(400,100); spawnWizardBall(600,300);
setInterval(()=>{ spawnWizardBall(Math.random()*(window.innerWidth-50), Math.random()*(window.innerHeight-50)); },10000);
setInterval(()=>{ fireballs++; },8000);

// ====================== CATCH SCREEN ======================

const catchWizardElem = document.getElementById("catchWizardBall");
const throwBall = document.getElementById("throwBall");
let currentCatchWizard = null;

function openCatchScreen(wizardData) {
    currentCatchWizard = wizardData;
    catchScreen.style.display = "block";
    catchWizardElem.style.background = wizardData.color;
    catchWizardElem.style.clipPath = wizardData.shape==="octagon" ? "polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)" : "none";
    catchWizardElem.style.borderRadius = wizardData.shape==="octagon" ? "0" : "50%";
    throwBall.style.transition = "none";
    throwBall.style.bottom = "80px";
}
function closeCatchScreen(){ catchScreen.style.display="none"; }

throwBall.addEventListener("click", () => {
    throwBall.style.transition = "all 0.6s ease";
    throwBall.style.bottom = "55%";
    setTimeout(() => {
        const caught = Math.random() < 0.75;
        if(caught){
            const name = prompt("Name your wizard:", currentCatchWizard.name) || currentCatchWizard.name;
            currentCatchWizard.name = name.trim();
            inventory.push(currentCatchWizard);
            alert("CAUGHT!\n"+currentCatchWizard.name+"\nIV: "+currentCatchWizard.iv);
            if(inventoryPanel.style.display!=="none") openInventory();
            closeCatchScreen();
        } else {
            alert("Escaped!");
            throwBall.style.bottom = "80px";
        }
    },700);
});

function catchWizard(ball, wizardData){
    if(fireballs>0){
        fireballs--;
        openCatchScreen(wizardData);
        despawnWizardBall(ball,wizardData);
    } else alert("No fireballs left!");
}

// ====================== GLOBAL RAID SYSTEM (PUBLIC MQTT - NO API KEY) ======================
const MQTT_BROKER = "wss://broker.hivemq.com:8884/mqtt";
let mqttClient = null;
let raidActive = null;
let raidHost = false;
let currentRaidCode = null;
const MAX_PLAYERS = 20;
const RAID_TIME = 300;
const RAID_TOPIC_PREFIX = "wizard-raid/";

function generateRaidCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
function randomRaidColor(){ return ["red","blue","green","purple","orange","pink","cyan"][Math.floor(Math.random()*7)]; }
function createRaidBoss(hp=2000){
    const shiny = Math.random()<0.1;
    return { name:"Polygon-"+ "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)], color:shiny?"gold":randomRaidColor(), shiny, maxHp:hp, hp:hp, shape:"octagon" };
}

// Connect to public MQTT broker (works worldwide, no key, no signup)
function connectMQTT(code){
    if(mqttClient) mqttClient.end();
    mqttClient = mqtt.connect(MQTT_BROKER, { keepalive: 30 });
    
    mqttClient.on('connect', () => {
        console.log("✅ Connected");
        mqttClient.subscribe(RAID_TOPIC_PREFIX + code);
        
        if(raidHost){
            // Host sends initial state
            mqttClient.publish(RAID_TOPIC_PREFIX + code, JSON.stringify({type:"raidState", raid:raidActive}));
        } else {
            // Joiner announces themselves
            mqttClient.publish(RAID_TOPIC_PREFIX + code, JSON.stringify({
                type:"joinRaid",
                playerName: prompt("Your trainer name?") || "Player",
                wizards: Array.from({length:6},(_,i)=>({name:`Wizard-${i+1}`, damagePerSec:5}))
            }));
        }
    });

    mqttClient.on('message', (topic, payload) => {
        try {
            const msg = JSON.parse(payload.toString());
            if(msg.type === "joinRaid" && raidHost && raidActive){
                if(raidActive.players.length >= MAX_PLAYERS) return;
                raidActive.players.push({name:msg.playerName, wizards:msg.wizards});
                mqttClient.publish(RAID_TOPIC_PREFIX + code, JSON.stringify({type:"raidState", raid:raidActive}));
                alert(msg.playerName + " joined the raid!");
            }
            if(msg.type === "raidState"){
                raidActive = msg.raid;
                showRaidBattleScreen(raidActive.boss);
                updateRaidUI();
            }
            if(msg.type === "raidEnded"){
                raidScreen.style.display = "none";
                if(msg.boss && msg.boss.hp <= 0) collectPolygonFromRaid(msg.boss);
                raidActive = null;
                if(mqttClient) mqttClient.end();
            }
        } catch(e){}
    });
}

// Create / Join
function createRaid(){
    raidHost = true;
    currentRaidCode = generateRaidCode();
    raidActive = {
        code: currentRaidCode,
        boss: createRaidBoss(),
        players: [{name: prompt("Your trainer name?")||"Host", wizards:Array.from({length:6},(_,i)=>({name:`Wizard-${i+1}`,damagePerSec:5}))}],
        timer: RAID_TIME
    };
    connectMQTT(currentRaidCode);
    alert(`🌍 RAID CREATED!\nCode: ${currentRaidCode}\nShare this code\nBoss: ${raidActive.boss.name}`);
    showRaidBattleScreen(raidActive.boss);
    startRaidBattleLoop();
}

function joinRaid(){
    raidHost = false;
    const code = prompt("Enter raid code:").toUpperCase().trim();
    if(!code) return;
    currentRaidCode = code;
    connectMQTT(code);
    showRaidBattleScreen({name:"Waiting for host...", color:"gray"}); // placeholder until state arrives
}

// Battle loop (only host runs the logic)
function startRaidBattleLoop(){
    if(!raidHost || !raidActive) return;
    showRaidBattleScreen(raidActive.boss);
    raidActive.intervalId = setInterval(() => {
        if(!raidActive) return;
        
        let totalDPS = 0;
        raidActive.players.forEach(p => p.wizards.forEach(w => totalDPS += w.damagePerSec));
        raidActive.boss.hp = Math.max(0, raidActive.boss.hp - totalDPS);
        raidActive.timer--;

        updateRaidUI();

        // Broadcast full state to everyone
        if(mqttClient) mqttClient.publish(RAID_TOPIC_PREFIX + currentRaidCode, JSON.stringify({type:"raidState", raid:raidActive}));

        if(raidActive.boss.hp <= 0){
            clearInterval(raidActive.intervalId);
            if(mqttClient) mqttClient.publish(RAID_TOPIC_PREFIX + currentRaidCode, JSON.stringify({type:"raidEnded", boss:raidActive.boss}));
            collectPolygonFromRaid(raidActive.boss);
            raidScreen.style.display = "none";
            raidActive = null;
        } else if(raidActive.timer <= 0){
            clearInterval(raidActive.intervalId);
            if(mqttClient) mqttClient.publish(RAID_TOPIC_PREFIX + currentRaidCode, JSON.stringify({type:"raidEnded"}));
            alert("⏱️ Time's up! Raid failed.");
            raidScreen.style.display = "none";
            raidActive = null;
        }
    }, 1000);
}

function updateRaidUI(){
    raidTimerElem.textContent = raidActive.timer;
    updateRaidHP(raidActive.boss.hp, raidActive.boss.maxHp);
}

// RAID SCREEN ELEMENTS

const raidTimerElem = document.getElementById('raidTimer');
const raidBossNameElem = document.getElementById('raidBossName');
const raidBossHPElem = document.getElementById('raidBossHP');
const raidBossCircleElem = document.getElementById('raidBossCircle');

function showRaidBattleScreen(boss){
    raidScreen.style.display = "flex";
    raidBossNameElem.textContent = boss.name || "Raid Boss";
    raidBossCircleElem.style.background = boss.color || "red";
    if(boss.shape === "octagon"){
        raidBossCircleElem.style.clipPath = "polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)";
        raidBossCircleElem.style.borderRadius = "0";
    } else {
        raidBossCircleElem.style.clipPath = "none";
        raidBossCircleElem.style.borderRadius = "50%";
    }
    updateRaidHP(boss.hp || 2000, boss.maxHp || 2000);
}
function updateRaidHP(current, max){
    raidBossHPElem.style.width = (current / max * 100) + "%";
}

// ====================== COLLECT POLYGON (OCTAGON REWARD) ======================
function collectPolygonFromRaid(boss){
    const polygon = {
        id: "polygon-" + Date.now(),
        name: boss.name,
        color: boss.color,
        iv: [6+Math.floor(Math.random()*5),6+Math.floor(Math.random()*5),6+Math.floor(Math.random()*5)].join("/"),
        shiny: boss.shiny,
        shape: "octagon"
    };
    openCatchScreen(polygon);
    if(inventoryPanel.style.display !== "none") openInventory();
}

// ====================== START GAME ======================
spawnWizardBall(200,200); spawnWizardBall(400,100); spawnWizardBall(600,300);

<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#222;color:white;padding:20px;border-radius:10px;text-align:center;">
    <h2>Wizard Planet Login</h2>
    <input id="loginUsername" placeholder="Username" style="margin:5px;"/><br/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwc_UlDGweMWbG17rBeytQ1Y2JpYEgrdI",
  authDomain: "wizard-planet0.firebaseapp.com",
  projectId: "wizard-planet0",
  storageBucket: "wizard-planet0.firebasestorage.app",
  messagingSenderId: "648724841842",
  appId: "1:648724841842:web:3cbe09a1b9a1b3dc07c9eb",
  databaseURL: "https://wizard-planet0-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ====================== SAVE / LOAD ======================
async function saveToFirebase() {
  if (!window.playerName || !window.playerPassword) return;
  
  try {
    await set(ref(db, "players/" + window.playerName), {
      password: window.playerPassword,
      inventory: inventory || []   // ← THIS WAS THE FIX
    });
    console.log("%c✅ Saved " + (inventory?.length || 0) + " wizards to Firebase", "color:lime;font-weight:bold");
  } catch (err) {
    console.error("Save error:", err);
  }
}

// Auto-save every 8 seconds (you can change)
setInterval(saveToFirebase, 8000);

// Load wizards on login
async function loadWizards(username) {
  try {
    const snapshot = await get(ref(db, "players/" + username));
    const data = snapshot.val();
    
    if (data && Array.isArray(data.inventory)) {
      inventory.length = 0;                    // clear current
      data.inventory.forEach(w => inventory.push(w));
      
      console.log("%c✅ Loaded " + inventory.length + " wizards from Firebase", "color:lime");
      if (inventoryPanel.style.display !== "none") openInventory();
    }
  } catch (err) {
    console.error("Load error:", err);
  }
}

// ====================== LOGIN / REGISTER ======================
document.getElementById("loginBtn").onclick = async () => {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  const msg = document.getElementById("loginMsg");
  
  if (!username || !password) return msg.textContent = "Enter username and password";
  
  const snapshot = await get(ref(db, "players/" + username));
  const data = snapshot.val();
  
  if (!data) return msg.textContent = "User does not exist";
  if (data.password !== password) return msg.textContent = "Wrong password";
  
  window.playerName = username;
  window.playerPassword = password;
  
  await loadWizards(username);
  document.getElementById("loginScreen").style.display = "none";
  msg.textContent = "";
  console.log("✅ Login successful:", username);
};

document.getElementById("registerBtn").onclick = async () => {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value.trim();
  const msg = document.getElementById("loginMsg");
  
  if (!username || !password) return msg.textContent = "Enter username and password";
  
  const snapshot = await get(ref(db, "players/" + username));
  if (snapshot.exists()) return msg.textContent = "Username already exists";
  
  window.playerName = username;
  window.playerPassword = password;
  
  // Create fresh account with empty inventory
  await set(ref(db, "players/" + username), { 
    password, 
    inventory: [] 
  });
  
  msg.style.color = "lime";
  msg.textContent = "Account created! Logging you in...";
  
  // Auto-login after register
  await loadWizards(username);
  document.getElementById("loginScreen").style.display = "none";
};

// Optional: Immediate save when you catch a wizard
const originalCatchWizard = catchWizard;
catchWizard = function(ball, wizardData) {
  originalCatchWizard(ball, wizardData);
  // Force save right after catching
  setTimeout(saveToFirebase, 500);
};
</script></body></html>

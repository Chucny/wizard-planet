<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Planet</title>
<style>
/* --- General --- */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background-color: lightblue;
}

/* --- Map --- */
#map {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

/* --- Player --- */
#player {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

/* --- Wizard Balls --- */
.red-ball {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 15;
}
.red-ball .eye {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    top: 15px;
}
.red-ball .eye.left { left: 12px; }
.red-ball .eye.right { right: 12px; }
.red-ball .hat {
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    border: 2px solid black;
}

/* --- Fireball --- */
.fireball {
    position: absolute;
    width: 20px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    z-index: 20;
    pointer-events: none;
}

/* --- Map tiles --- */
.tile {
    position: absolute;
    width: 256px;
    height: 256px;
    z-index: 0;
}

/* --- Inventory Panel --- */
#inventoryPanel {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    max-height: 50%;
    background: rgba(175, 228, 222, 0.95);
    color: black;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 10px;
    display: flex;
    flex-wrap: nowrap;
    align-items: flex-start;
    gap: 10px;
    z-index: 100;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
    display: none;
}

/* --- Wizard card --- */
.wizard-card {
    border: 1px solid #444;
    padding: 5px;
    background: lightblue;
    width: 120px;
    text-align: center;
    border-radius: 8px;
    flex: 0 0 auto;
}
.wizard-name { font-weight: bold; margin-bottom: 5px; }
.wizard-color {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    margin: 5px auto;
}
.wizard-stars { margin: 5px 0; }
.wizard-stats div {
    font-size: 12px;
    margin: 2px 0;
}
.stat-bar {
    display: inline-block;
    height: 6px;
    background: limegreen;
    margin-left: 5px;
    border-radius: 3px;
}

/* --- Inventory Button --- */
#inventoryButton {
    position: fixed;
    bottom: 10px;
    right: 10px;
    z-index: 150;
    width: 50px;
    height: 50px;
    border: none;
    background: #ff8800;
    color: white;
    font-weight: bold;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
}

/* --- Save Button --- */
#savebutton {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 150;
}

/* --- Raid UI --- */
#raidUI {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
#raidUI button {
    padding: 5px 10px;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- Map and player -->
<div id="map">
    <div id="player"></div>
</div>

<!-- Inventory panel -->
<div id="inventoryPanel"></div>
<button id="inventoryButton">O</button>
<div id="savebutton">
    <button onclick="downloaad(inventory)" style="color:white;background-color:lightblue;">Save</button>
</div>
<input type="file" id="loadFileInput" style="display:none;" accept=".wizard">

<!-- Import Inventory -->
<div style="position: fixed; bottom: 80px; right: 10px; z-index: 200;">
    <button onclick="loadInventoryFromFile()" style="color:white;background-color:lightblue;">Import</button>
</div>

<!-- Raid UI -->
<div id="raidUI">
    <button onclick="createRaid()">Create Raid</button>
    <button onclick="joinRaid()">Join Raid</button>
</div>

<script>
// --- MAP ---
const TILE_SIZE = 256;
let zoom = 15;
let map = document.getElementById('map');
let player = document.getElementById('player');
let mapTiles = [];

// --- GAME DATA ---
let fireballs = 30;
let wizardIdCounter = 1;
const wizards = {};
const spawnedBalls = new Set();
const inventory = [];

// --- Inventory Load/Save ---
function downloaad(inventory) {
    const jsonString = JSON.stringify(inventory,null,2);
    const blob = new Blob([jsonString], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = prompt("Name your save file")+".wizard";
    link.click();
    URL.revokeObjectURL(link.href);
}

function loadInventoryFromFile() {
    const fileInput = document.getElementById('loadFileInput');
    fileInput.click();
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (Array.isArray(data)) {
                    inventory.length = 0;
                    inventory.push(...data);
                    alert('Account loaded! Total wizards: ' + inventory.length);
                } else alert('Invalid JSON format: expected an array.');
            } catch(err) {
                alert('Error parsing JSON: '+err.message);
            }
        };
        reader.readAsText(file);
    }
}

// --- Map Functions ---
function latLngToTile(lat,lng,zoom) {
    const n = Math.pow(2, zoom);
    let x = Math.floor((lng + 180)/360 * n);
    let y = Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n);
    x = Math.max(0, Math.min(x,n-1));
    y = Math.max(0, Math.min(y,n-1));
    return {x,y};
}

function drawMap(lat,lng) {
    mapTiles.forEach(t=>t.remove());
    mapTiles=[];
    const cols = Math.ceil(window.innerWidth / TILE_SIZE)+2;
    const rows = Math.ceil(window.innerHeight / TILE_SIZE)+2;
    const centerTile = latLngToTile(lat,lng,zoom);
    for (let dx=-Math.floor(cols/2); dx<=Math.floor(cols/2); dx++){
        for (let dy=-Math.floor(rows/2); dy<=Math.floor(rows/2); dy++){
            const tileX = centerTile.x+dx;
            const tileY = centerTile.y+dy;
            const img = document.createElement('img');
            img.src = `https://tile.openstreetmap.org/${zoom}/${tileX}/${tileY}.png`;
            img.className='tile';
            img.style.left=`${(dx+Math.floor(cols/2))*TILE_SIZE}px`;
            img.style.top=`${(dy+Math.floor(rows/2))*TILE_SIZE}px`;
            map.appendChild(img);
            mapTiles.push(img);
        }
    }
    player.style.left = window.innerWidth/2+"px";
    player.style.top = window.innerHeight/2+"px";
}

async function updateMapWithCurrentLocation() {
    if (navigator.geolocation){
        navigator.geolocation.getCurrentPosition(pos=>{
            const lat=pos.coords.latitude;
            const lng=pos.coords.longitude;
            drawMap(lat,lng);
        }, async err=>{
            console.warn("GPS failed:", err.message);
            try{
                const res=await fetch("https://api.codetabs.com/v1/geolocation/json");
                const data=await res.json();
                if(data && typeof data.latitude==="number" && typeof data.longitude==="number"){
                    drawMap(data.latitude,data.longitude);
                }
            }catch(e){console.error("IP fallback failed",e);}
        }, {enableHighAccuracy:true,timeout:5000,maximumAge:0});
    }
}

updateMapWithCurrentLocation();
setInterval(updateMapWithCurrentLocation,30000);

// --- Wizard Spawn ---
function getRandomColor(){
    const colors=['red','green','blue','purple','yellow','gold'];
    return colors[Math.floor(Math.random()*colors.length)];
}

function spawnWizardBall(x,y,wizardData=null){
    if(!wizardData){
        wizardData = {id: wizardIdCounter++, iv:`${Math.floor(Math.random()*10)}/${Math.floor(Math.random()*10)}/${Math.floor(Math.random()*10)}`, color:getRandomColor(), name:'Wizard '+wizardIdCounter};
    }
    wizards[wizardData.id] = wizardData;
    const ball=document.createElement('div');
    ball.className='red-ball';
    ball.style.left=x+'px';
    ball.style.top=y+'px';
    ball.style.background=wizardData.color;
    const leftEye=document.createElement('div');
    leftEye.className='eye left';
    const rightEye=document.createElement('div');
    rightEye.className='eye right';
    const hat=document.createElement('div');
    hat.className='hat';
    ball.appendChild(leftEye);
    ball.appendChild(rightEye);
    ball.appendChild(hat);
    ball.addEventListener('click',()=>{catchWizard(ball,wizardData)});
    map.appendChild(ball);
    spawnedBalls.add(ball);
    return ball;
}

function despawnWizardBall(ball,wizardData){
    if(spawnedBalls.has(ball)){
        ball.remove();
        spawnedBalls.delete(ball);
        delete wizards[wizardData.id];
    }
}

function addToInventory(wizardData){
    inventory.push(wizardData);
    console.log('Gotcha!',wizardData);
}



// --- Inventory UI ---
const inventoryPanel=document.getElementById("inventoryPanel");
const inventoryButton=document.getElementById("inventoryButton");
function createWizardCard(wizardData){
    const card=document.createElement("div"); card.className="wizard-card";
    const nameDiv=document.createElement("div"); nameDiv.className="wizard-name"; nameDiv.textContent=wizardData.name;
    const colorDiv=document.createElement("div"); colorDiv.className="wizard-color"; colorDiv.style.background=wizardData.color;
    const ivParts=wizardData.iv.split("/").map(n=>parseInt(n));
    const totalIV=ivParts.reduce((a,b)=>a+b,0); const maxIV=30;
    const starDiv=document.createElement("div"); starDiv.className="wizard-stars"; starDiv.textContent="⭐".repeat(Math.ceil((totalIV/maxIV)*3));
    const statsDiv=document.createElement("div"); statsDiv.className="wizard-stats";
    ["Atk","Def","Spd"].forEach((s,i)=>{
        const statDiv=document.createElement("div"); statDiv.textContent=s+": ";
        const bar=document.createElement("div"); bar.className="stat-bar"; bar.style.width=(ivParts[i]/10*100)+"%";
        statDiv.appendChild(bar); statsDiv.appendChild(statDiv);
    });
    card.appendChild(nameDiv); card.appendChild(colorDiv); card.appendChild(starDiv); card.appendChild(statsDiv);
    return card;
}
function openInventory(){inventoryPanel.innerHTML="";inventory.forEach(w=>inventoryPanel.appendChild(createWizardCard(w)));inventoryPanel.style.display="flex";}
function closeInventory(){inventoryPanel.style.display="none";}
inventoryButton.addEventListener("click",()=>{if(inventoryPanel.style.display==="none") openInventory(); else closeInventory();});

// Spawn some initial wizards
spawnWizardBall(200,200); spawnWizardBall(400,100); spawnWizardBall(600,300);
setInterval(()=>{const x=Math.random()*(window.innerWidth-50);const y=Math.random()*(window.innerHeight-50); spawnWizardBall(x,y);},10000);
setInterval(()=>{fireballs+=1;console.log("Fireballs:",fireballs)},8000);

// --- RAID SYSTEM ---
let raidActive = null;
const MAX_PLAYERS=20;
const RAID_TIME=300;

function randomLetter(){return "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];}
function randomRaidColor(){return ["red","blue","green","purple","orange","pink","cyan"][Math.floor(Math.random()*7)];}
function createRaidBoss(hp=2000){const shiny=Math.random()<0.1; return {name:"Polygon-"+randomLetter(),color:shiny?"gold":randomRaidColor(),shiny:shiny,maxHp:hp,hp:hp};}

function createRaid(){
    const code=Math.random().toString(36).substring(2,8).toUpperCase();
    raidActive={code:code,boss:createRaidBoss(),players:[],timer:RAID_TIME,intervalId:null};
    alert("Raid Created!\nCode: "+code+"\nBoss: "+raidActive.boss.name+"\nColor: "+raidActive.boss.color+(raidActive.boss.shiny?" ✨SHINY!":"")+"\nMax HP: "+raidActive.boss.hp);
}

function joinRaid(){
    if(!raidActive){alert("No active raid exists."); return;}
    if(raidActive.players.length>=MAX_PLAYERS){alert("Raid full!"); return;}
    const code=prompt("Enter raid code:");
    if(code!==raidActive.code){alert("Wrong code."); return;}
    const playerName=prompt("Your trainer name?");
    if(!playerName) return;
    const battleWizards=Array.from({length:6},(_,i)=>({name:`Wizard-${i+1}`,damagePerSec:5}));
    raidActive.players.push({name:playerName,wizards:battleWizards});
    alert(playerName+" joined raid!\nPlayers: "+raidActive.players.map(p=>p.name).join(", "));
    if(!raidActive.intervalId) startRaidBattleWithScreen();
}

function startRaidBattle(){
    if(!raidActive) return;
    raidActive.intervalId=setInterval(()=>{
        if(!raidActive||raidActive.players.length===0) return;
        let totalDPS=0;
        raidActive.players.forEach(p=>p.wizards.forEach(w=>totalDPS+=w.damagePerSec));
        raidActive.boss.hp-=totalDPS;
        raidActive.timer--;
        console.log(`Boss HP: ${Math.max(raidActive.boss.hp,0)} | Time left: ${raidActive.timer}s | Players: ${raidActive.players.length}`);
        if (raidActive.boss.hp <= 0) {
 		   collectPolygonFromRaid(raidActive.boss); // <-- add this
 		   clearInterval(raidActive.intervalId);
 		   raidActive = null;
		}
        else if(raidActive.timer<=0){
            alert("⏱️ Time's up! Raid failed.\nBoss remaining HP: "+raidActive.boss.hp);
            clearInterval(raidActive.intervalId); raidActive=null;
        }
    },1000);
}
function collectPolygonFromRaid(boss) {
    // Generate random IVs 10-15
    const iv = [
        Math.floor(Math.random() * 6) + 6, // Atk
        Math.floor(Math.random() * 6) + 6, // Def
        Math.floor(Math.random() * 6) + 6  // Spd
    ].join("/");

    // Random color (or golden if shiny)
    const color = boss.shiny ? "gold" : boss.color;

    // Construct Polygon object
    const polygon = {
        id: "polygon-" + Date.now(),  // unique id
        name: boss.name,
        color: color,
        iv: iv,
        shiny: boss.shiny
    };

    // Add to inventory
    openCatchScreen(polygon);



    // Update inventory UI if open
    if (inventoryPanel.style.display !== "none") openInventory();
}
</script>
<!-- --- RAID BATTLE SCREEN --- -->
<div id="raidBattleScreen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-image:url(https://wallup.net/wp-content/uploads/2016/05/02/274452-architecture-nature-trees-Sun-pillar-stone-Colosseum-Rome-Italy-capital-stairs-sunlight-path-field-grass-arena-arch-building-monuments.jpg); z-index:500; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:50px;">

    <div id="raidTimer" style="width:60px; height:60px; border-radius:50%; background:orange; color:white; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold; margin-bottom:20px;">0</div>

    <!-- Boss name -->
    <div id="raidBossName" style="color:white; font-size:24px; font-weight:bold; margin-bottom:10px;">Boss</div>

    <!-- Boss HP bar -->
    <div style="width:80%; height:20px; background:#333; border-radius:10px; margin-bottom:20px;">
        <div id="raidBossHP" style="height:100%; width:100%; background:red; border-radius:10px;"></div>

    </div>
</div>

<script>


// --- RAID BATTLE SCREEN LOGIC ---
const raidScreen = document.getElementById('raidBattleScreen');
const raidTimerElem = document.getElementById('raidTimer');
const raidBossNameElem = document.getElementById('raidBossName');
const raidBossHPElem = document.getElementById('raidBossHP');
const raidBossCircleElem = document.getElementById('raidBossCircle');

function showRaidBattleScreen(boss) {
    const raidScreen = document.getElementById('raidBattleScreen');
    const raidBossNameElem = document.getElementById('raidBossName');
    const raidBossHPElem = document.getElementById('raidBossHP');
    const raidBossCircleElem = document.getElementById('raidBossCircle');

    raidScreen.style.display = 'flex'; // Show the raid UI
    raidBossNameElem.textContent = boss.name;
    raidBossCircleElem.style.background = boss.color;
    raidBossHPElem.style.width = (boss.hp / boss.maxHp * 100) + '%';
}

// Update the boss HP bar dynamically
function updateRaidHP(currentHP, maxHP) {
    const raidBossHPElem = document.getElementById('raidBossHP');
    raidBossHPElem.style.width = (currentHP / maxHP * 100) + '%';
}

// --- CODE GENERATOR ---
// --- P2P RAID LOGIC (Wi-Fi / localStorage) ---

let raidChannelCode = null;
let raidHost = false;

// Generate a raid code
function generateRaidCode() {
    return Math.random().toString(36).substring(2,10).toUpperCase();
}

// Sync raid state across tabs/devices
function syncRaidState() {
    if (raidChannelCode && raidActive) {
        localStorage.setItem("raid_" + raidChannelCode, JSON.stringify(raidActive));
    }
}

// Listen for updates from other tabs/devices
window.addEventListener("storage", (e) => {
    if (!raidChannelCode) return;
    if (e.key === "raid_" + raidChannelCode && e.newValue) {
        const incoming = JSON.parse(e.newValue);
        raidActive = incoming;
        if (raidActive) {
            showRaidBattleScreen(raidActive.boss);
            raidTimerElem.textContent = raidActive.timer;
            updateRaidHP(raidActive.boss.hp, raidActive.boss.maxHp);
        }
    }
});

// Create Raid (Host)
// --- P2P RAID via BroadcastChannel ---
const raidChannel = new BroadcastChannel("wizardRaid");

// Track raid state

raidActive = null; // overwrite previous global

// --- Host creates a raid ---
function createRaid() {
    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
    raidActive = {
        code,
        boss: createRaidBoss(), 
        players: [{ name: "Host", wizards: Array.from({length:6}, (_,i)=>({name:`Wizard-${i+1}`,damagePerSec:5})) }],
        timer: RAID_TIME,
        intervalId: null
    };
    raidHost = true;

    // Broadcast raid creation
    raidChannel.postMessage({ type: "create", raid: raidActive });
    alert(`Raid Created! Code: ${code}\nBoss: ${raidActive.boss.name} (${raidActive.boss.color}${raidActive.boss.shiny?" ✨SHINY!":""})`);
    
    // Start battle UI
    startRaidBattleWithScreen();
}

// --- Join raid on another tab/device ---
function joinRaid() {
    const code = prompt("Enter raid code:");
    if (!code) return;

    // Send join request
    const playerName = prompt("Your trainer name?");
    if (!playerName) return;

    raidChannel.postMessage({ 
        type: "joinRequest", 
        code: code.toUpperCase(), 
        player: { name: playerName, wizards: Array.from({length:6}, (_,i)=>({name:`Wizard-${i+1}`,damagePerSec:5})) } 
    });
}

// --- Listen for raid messages ---
raidChannel.onmessage = (event) => {
    const data = event.data;

    // A new raid is created on another device
    if (data.type === "create" && !raidHost) {
        raidActive = data.raid;
        alert(`Raid available! Code: ${raidActive.code}\nBoss: ${raidActive.boss.name} (${raidActive.boss.color}${raidActive.boss.shiny?" ✨SHINY!":""})`);
        showRaidBattleScreen(raidActive.boss);
    }

    // Another player requests to join our raid
    if (data.type === "joinRequest" && raidHost && raidActive && data.code === raidActive.code) {
        raidActive.players.push(data.player);
        console.log(`${data.player.name} joined your raid!`);
        alert(`${data.player.name} joined your raid!`);
        // Broadcast updated state to everyone
        raidChannel.postMessage({ type: "update", raid: raidActive });
    }

    // Receive updated raid state from host
    if (data.type === "update" && !raidHost) {
        raidActive = data.raid;
        showRaidBattleScreen(raidActive.boss);
        console.log("Raid updated:", raidActive.players.map(p=>p.name));
    }
};

// Battle loop with UI
function startRaidBattleWithScreen() {
    if (!raidActive) return;

    showRaidBattleScreen(raidActive.boss);

    raidActive.intervalId = setInterval(() => {
        if (!raidActive || raidActive.players.length===0) return;

        let totalDPS = 0;
        raidActive.players.forEach(p => p.wizards.forEach(w => totalDPS += w.damagePerSec));

        raidActive.boss.hp -= totalDPS;
        raidActive.timer--;

        raidTimerElem.textContent = raidActive.timer;
        updateRaidHP(raidActive.boss.hp, raidActive.boss.maxHp);

        syncRaidState();

        if (raidActive.boss.hp <= 0) {
            clearInterval(raidActive.intervalId);
            raidScreen.style.display = 'none';
            collectPolygonFromRaid(raidActive.boss);
            localStorage.removeItem("raid_" + raidChannelCode);
            raidActive = null;
        } else if (raidActive.timer <= 0) {
            alert("⏱️ Time's up! Raid failed.");
            clearInterval(raidActive.intervalId);
            raidScreen.style.display = 'none';
            localStorage.removeItem("raid_" + raidChannelCode);
            raidActive = null;
        }
    },1000);
}
// Replace your startRaidBattle() calls with startRaidBattleWithScreen() to show this UI
</script>

    peerConnection.onicecandidate = e => {
        if(e.candidate) {
            console.log("ICE candidate:", JSON.stringify(e.candidate));
        }
    };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

async function joinRaidP2P() {
    const offerStr = prompt("Paste host offer JSON:");

    peerConnection = new RTCPeerConnection();

    peerConnection.ondatachannel = e => {
        dataChannel = e.channel;
        setupDataChannel();
    };

    peerConnection.onicecandidate = e => {
        if(e.candidate) console.log("ICE candidate (joiner):", JSON.stringify(e.candidate));
    };

    await peerConnection.setRemoteDescription(offer);
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    // Send answer back to host
    prompt("Send this answer back to host:", JSON.stringify(answer));
}

// HOST: after receiving answer from joiner

<script>
// ======================================
// CLEAN WORLD RAID SYSTEM + CATCH REWARD
// ======================================

let raidSocket = null;

let playerName = "";



// ----------------------------
// Helpers
// ----------------------------
function generateRaidCode() {
    return Math.random().toString(36).substring(2,8).toUpperCase();
}

function randomLetter() {
    return "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
}

function randomRaidColor() {
    return ["red","blue","green","purple","orange","pink","cyan"][Math.floor(Math.random()*7)];
}

function createRaidBoss(hp=2000) {
    const shiny = Math.random() < 0.1;

    return {
        name: "Polygon-" + randomLetter(),
        color: shiny ? "gold" : randomRaidColor(),
        shiny,
        hp,
        maxHp: hp,
        shape: "octagon"
    };
}

// ----------------------------
// Socket Connection
// ----------------------------
function connectRaidSocket(code) {

    raidSocket = new WebSocket(
        "wss://free.blr2.piesocket.com/v3/1?api_key=&notify_self=1"
    );

    raidSocket.onopen = () => {
        console.log("Raid socket connected");
    };

    raidSocket.onmessage = (event) => {

        let msg;

        try {
            msg = JSON.parse(event.data);
        } catch {
            return;
        }

        if (msg.room !== code) return;

        // Host receives join request
        if (msg.type === "joinRaid" && raidActive) {

            raidActive.players.push({
                name: msg.player,
                wizards: Array.from({length:6},(_,i)=>({
                    name:`Wizard-${i+1}`,
                    damagePerSec:5
                }))
            });

            alert(msg.player + " joined your raid!");
        }

        // Everyone receives raid state
        if (msg.type === "raidState") {

            raidActive = msg.raid;

            showRaidBattleScreen(raidActive.boss);

            raidTimerElem.textContent = raidActive.timer;

            updateRaidHP(
                raidActive.boss.hp,
                raidActive.boss.maxHp
            );
        }

        // Raid end
        if (msg.type === "raidEnded") {

            raidScreen.style.display = "none";

            if (msg.boss) {
                collectPolygonFromRaid(msg.boss);
            }

            raidActive = null;
        }
    };
}

// ----------------------------
// Create Raid
// ----------------------------
function createRaid() {

    playerName = prompt("Enter your trainer name") || "Wizard";

    const code = generateRaidCode();

    raidActive = {
        code,
        boss: createRaidBoss(),
        players: [{
            name: playerName,
            wizards: Array.from({length:6},(_,i)=>({
                name:`Wizard-${i+1}`,
                damagePerSec:5
            }))
        }],
        timer: RAID_TIME
    };

    connectRaidSocket(code);

    alert(
        "Worldwide Raid Created!\n" +
        "Code: " + code + "\n" +
        "Boss: " + raidActive.boss.name
    );

    showRaidBattleScreen(raidActive.boss);

    startRaidLoop();
}

// ----------------------------
// Join Raid
// ----------------------------
function joinRaid() {

    playerName = prompt("Enter your trainer name") || "Wizard";

    const code = prompt("Enter raid code");
    if (!code) return;

    connectRaidSocket(code.toUpperCase());

    raidSocket.onopen = () => {

        raidSocket.send(JSON.stringify({
            room: code.toUpperCase(),
            type: "joinRaid",
            player: playerName
        }));
    };
}

// ----------------------------
// Raid Battle Loop (Host only)
// ----------------------------
function startRaidLoop() {

    const loop = setInterval(() => {

        if (!raidActive) {
            clearInterval(loop);
            return;
        }

        let totalDPS = 0;

        raidActive.players.forEach(player=>{
            player.wizards.forEach(wizard=>{
                totalDPS += wizard.damagePerSec;
            });
        });

        raidActive.boss.hp -= totalDPS;
        raidActive.timer--;

        raidActive.boss.hp = Math.max(0, raidActive.boss.hp);

        raidTimerElem.textContent = raidActive.timer;

        updateRaidHP(
            raidActive.boss.hp,
            raidActive.boss.maxHp
        );

        raidSocket.send(JSON.stringify({
            room: raidActive.code,
            type: "raidState",
            raid: raidActive
        }));

        // Victory
        if (raidActive.boss.hp <= 0) {

            clearInterval(loop);

            raidScreen.style.display = "none";

            collectPolygonFromRaid(raidActive.boss);

            raidSocket.send(JSON.stringify({
                room: raidActive.code,
                type: "raidEnded",
                boss: raidActive.boss
            }));

            raidActive = null;
        }

        // Failure
        if (raidActive.timer <= 0) {

            clearInterval(loop);

            alert("Raid failed!");

            raidSocket.send(JSON.stringify({
                room: raidActive.code,
                type: "raidEnded"
            }));

            raidActive = null;
        }

    },1000);
}

// ----------------------------
// Raid UI
// ----------------------------
function showRaidBattleScreen(boss) {

    raidScreen.style.display = "flex";

    raidBossNameElem.textContent = boss.name;

    raidBossCircleElem.style.background = boss.color;

    raidBossHPElem.style.width =
        (boss.hp / boss.maxHp * 100) + "%";

    if (boss.shape === "octagon") {
        raidBossCircleElem.style.clipPath =
            "polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)";
        raidBossCircleElem.style.borderRadius = "0";
    } else {
        raidBossCircleElem.style.clipPath = "none";
        raidBossCircleElem.style.borderRadius = "50%";
    }
}

function updateRaidHP(currentHP,maxHP) {
    raidBossHPElem.style.width =
        (currentHP/maxHP*100)+"%";
}

// ----------------------------
// Reward Catch
// ----------------------------
function collectPolygonFromRaid(boss) {

    const polygon = {
        id: "polygon-" + Date.now(),
        name: boss.name,
        color: boss.color,
        iv: [
            Math.floor(Math.random()*6)+4,
            Math.floor(Math.random()*6)+4,
            Math.floor(Math.random()*6)+4
        ].join("/"),
        shiny: boss.shiny,
        shape: "octagon"
    };

    openCatchScreen(polygon);

    catchWizardElem.style.background = polygon.color;

    catchWizardElem.style.clipPath =
        "polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)";

    catchWizardElem.style.borderRadius = "0";
}

</script>
<!-- Inventory Panel -->
<div id="inventoryContainer" style="position:fixed; bottom:0; left:0; width:100%; max-height:50%; background:rgba(240,240,240,0.95); z-index:1000; padding:10px; display:none; flex-direction:column; box-shadow:0 -5px 15px rgba(0,0,0,0.5);">
    <!-- Search Bar -->
    <input id="inventorySearch" type="text" placeholder="Search wizards..." style="margin-bottom:10px; padding:5px; font-size:16px; border-radius:5px; border:1px solid #aaa;">
    <!-- Card Scroll Area -->
    <div id="inventoryScroll" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;"></div>
</div>

<button id="inventoryToggle" style="position:fixed; bottom:10px; right:10px; z-index:1100; width:50px; height:50px; border:none; background:#ff8800; color:white; font-weight:bold; border-radius:50%; cursor:pointer; font-size:20px;">O</button>

<script>
const inventoryContainer = document.getElementById('inventoryContainer');
const inventoryScroll = document.getElementById('inventoryScroll');
const inventoryToggle = document.getElementById('inventoryToggle');
const inventorySearch = document.getElementById('inventorySearch');

// Toggle inventory display
inventoryToggle.addEventListener('click', () => {
    inventoryContainer.style.display = inventoryContainer.style.display === 'flex' ? 'none' : 'flex';
    if(inventoryContainer.style.display==='flex') renderInventory();
});

// Render inventory
function renderInventory(filter="") {
    inventoryScroll.innerHTML = "";
    inventory.filter(w=>w.name.toLowerCase().includes(filter.toLowerCase()))
        .forEach(w=>inventoryScroll.appendChild(createInventoryCard(w)));
}

// Inventory card design
function createInventoryCard(wizardData) {
    const card = document.createElement('div');
    card.style.minWidth = "120px";
    card.style.background = "#fff";
    card.style.borderRadius = "10px";
    card.style.padding = "10px";
    card.style.boxShadow = "0 3px 6px rgba(0,0,0,0.2)";
    card.style.textAlign = "center";
    card.style.flex = "0 0 auto";

    // Wizard shape
    const colorDiv = document.createElement('div');
    colorDiv.style.width = "60px";
    colorDiv.style.height = "60px";
    colorDiv.style.margin = "0 auto 5px";
    colorDiv.style.background = wizardData.color || "gray";

    if(wizardData.shape==="octagon"){
        colorDiv.style.clipPath="polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%)";
        colorDiv.style.borderRadius="0";
    } else {
        colorDiv.style.borderRadius="50%";
        colorDiv.style.clipPath="none";
    }
    card.appendChild(colorDiv);

    // Name
    const nameDiv = document.createElement('div');
    nameDiv.textContent = wizardData.name;
    nameDiv.style.fontWeight = "bold";
    nameDiv.style.marginBottom = "5px";
    card.appendChild(nameDiv);

    // IV / CP badge
    const cpDiv = document.createElement('div');
    cpDiv.textContent = "IV: "+wizardData.iv;
    cpDiv.style.background="#f4b400";
    cpDiv.style.color="#fff";
    cpDiv.style.borderRadius="5px";
    cpDiv.style.padding="2px 5px";
    cpDiv.style.fontSize="12px";
    cpDiv.style.display="inline-block";
    card.appendChild(cpDiv);

    return card;
}

// Filter inventory by search
inventorySearch.addEventListener('input', ()=>renderInventory(inventorySearch.value));
</script>
</body>
</html>
